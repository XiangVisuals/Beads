<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼豆图纸生成器 Pro - 行业标准版</title>
    <!-- 引入 Tailwind CSS 进行响应式样式布局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; /* 防止移动端意外滚动 */
            touch-action: none; /* 交给内部 canvas 处理触摸 */
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        .canvas-container {
            cursor: crosshair;
            background-image: 
                linear-gradient(45deg, #1f2937 25%, transparent 25%), 
                linear-gradient(-45deg, #1f2937 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1f2937 75%), 
                linear-gradient(-45deg, transparent 75%, #1f2937 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #111827;
        }

        /* 自定义 Range 滑块样式 */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #8b5cf6;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #374151;
            border-radius: 2px;
        }
        
        /* 隐藏移动端未激活的 Tab 面板 */
        @media (max-width: 768px) {
            .mobile-hidden { display: none !important; }
            .mobile-active { display: flex !important; flex-direction: column; position: absolute; inset: 0; z-index: 20; background: #111827; }
        }
        
        /* Toast 提示框动画 */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            pointer-events: none;
        }
        .toast {
            background: rgba(17, 24, 39, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border: 1px solid #374151;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 h-screen w-screen flex flex-col">

    <!-- Toast 容器 -->
    <div id="toast-container"></div>

    <!-- 隐藏的文件上传组件 -->
    <input type="file" id="file-upload" accept="image/*" class="hidden">

    <!-- 顶部导航栏 -->
    <header class="h-14 border-b border-gray-800 bg-gray-900 flex items-center justify-between px-4 shrink-0 z-30 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-violet-600 flex items-center justify-center text-white shadow-lg shadow-violet-500/20">
                <i class="fa-solid fa-border-all"></i>
            </div>
            <h1 class="text-lg font-bold text-white tracking-tight hidden sm:block">专业拼豆图纸工具</h1>
        </div>
        <div class="flex items-center gap-2" id="header-actions" style="display: none;">
            <button onclick="exportCSV()" class="flex items-center gap-2 px-3 py-1.5 text-sm font-medium bg-gray-800 text-gray-300 rounded-md hover:bg-gray-700 transition-colors border border-gray-700">
                <i class="fa-solid fa-file-csv"></i> <span class="hidden sm:inline">导出色号清单</span>
            </button>
            <button onclick="exportProfessionalBlueprint()" class="flex items-center gap-2 px-4 py-1.5 text-sm font-medium bg-violet-600 text-white rounded-md hover:bg-violet-500 transition-colors shadow-lg shadow-violet-500/20">
                <i class="fa-solid fa-download"></i> <span class="hidden sm:inline">导出标准图纸</span>
            </button>
        </div>
    </header>

    <!-- 主体内容区 -->
    <div class="flex-1 flex overflow-hidden relative">
        
        <!-- 左侧设置面板 (桌面端常驻，移动端通过Tab切换) -->
        <aside id="panel-settings" class="w-full md:w-72 shrink-0 border-r border-gray-800 bg-gray-900 overflow-y-auto flex-col hidden md:flex mobile-active">
            <div class="p-4 space-y-6">
                <!-- 图片来源 -->
                <div class="space-y-3">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider">源图片</h2>
                    <div id="image-preview-container" onclick="document.getElementById('file-upload').click()" class="relative group rounded-xl overflow-hidden border-2 border-dashed border-gray-700 bg-gray-800/50 aspect-video flex flex-col items-center justify-center text-gray-500 hover:border-violet-500 hover:text-violet-400 transition-colors cursor-pointer">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl mb-2" id="upload-icon"></i>
                        <p class="text-sm font-medium" id="upload-text">点击上传图片</p>
                        <img id="source-image-preview" src="" alt="预览" class="absolute inset-0 w-full h-full object-contain hidden bg-black">
                        <div id="image-hover-overlay" class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity hidden items-center justify-center">
                            <span class="px-3 py-1.5 bg-white/10 backdrop-blur text-white rounded-lg text-sm font-medium border border-white/20">更换图片</span>
                        </div>
                    </div>
                </div>

                <hr class="border-gray-800" />

                <!-- 生成参数 -->
                <div class="space-y-4">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider flex items-center gap-2"><i class="fa-solid fa-sliders"></i> 图纸参数</h2>
                    
                    <div class="space-y-2">
                        <div class="flex justify-between text-sm">
                            <label class="text-gray-400">图纸宽度 (颗粒数)</label>
                            <span class="font-mono text-violet-400" id="val-width">50</span>
                        </div>
                        <input type="range" id="setting-width" min="10" max="150" value="50">
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm text-gray-400 block">调色板标准</label>
                        <select id="setting-palette" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-2 text-sm text-gray-200 focus:outline-none focus:border-violet-500">
                            <option value="standard">专业标准 50 色 (参考标准)</option>
                            <option value="perler">Perler 经典色系</option>
                            <option value="grayscale">黑白灰阶</option>
                        </select>
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="text-sm text-gray-400 cursor-pointer select-none">平滑过渡 (抖动算法)</label>
                        <button id="setting-dither" class="w-10 h-5 rounded-full relative transition-colors bg-gray-700">
                            <div class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-transform transform translate-x-0" id="dither-knob"></div>
                        </button>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <label class="text-sm text-gray-400 cursor-pointer select-none">纯白背景视为空白</label>
                        <button id="setting-ignore-white" class="w-10 h-5 rounded-full relative transition-colors bg-violet-600">
                            <div class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-transform transform translate-x-5" id="ignore-white-knob"></div>
                        </button>
                    </div>
                </div>

                <hr class="border-gray-800" />

                <!-- 色彩调整 -->
                <div class="space-y-4">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider flex items-center gap-2"><i class="fa-solid fa-palette"></i> 图像调整</h2>
                    
                    <div class="space-y-2">
                        <div class="flex justify-between text-sm">
                            <label class="text-gray-400">亮度</label>
                            <span class="font-mono text-gray-300" id="val-brightness">0</span>
                        </div>
                        <input type="range" id="setting-brightness" min="-100" max="100" value="0">
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between text-sm">
                            <label class="text-gray-400">对比度</label>
                            <span class="font-mono text-gray-300" id="val-contrast">0</span>
                        </div>
                        <input type="range" id="setting-contrast" min="-100" max="100" value="0">
                    </div>
                </div>
            </div>
        </aside>

        <!-- 中间画布区 -->
        <main id="panel-canvas" class="flex-1 relative flex flex-col bg-gray-950 hidden md:flex">
            
            <!-- 空状态 -->
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center z-10 p-8 text-center pointer-events-none">
                <div class="w-24 h-24 rounded-full bg-gray-900 border border-gray-800 flex items-center justify-center mb-6 shadow-inner">
                    <i class="fa-solid fa-image text-4xl text-gray-600"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-300 mb-2">工作区为空</h2>
                <p class="text-sm max-w-sm text-gray-500 mb-8">请上传一张图片，系统将自动根据标准色卡为您转换成可用于商用输出的专业拼豆图纸。</p>
                <button onclick="document.getElementById('file-upload').click()" class="pointer-events-auto px-6 py-3 bg-violet-600 text-white rounded-xl hover:bg-violet-500 font-medium transition-all shadow-lg shadow-violet-600/20 active:scale-95">
                    选择图片文件
                </button>
            </div>

            <!-- 画布交互层 -->
            <div id="workspace" class="flex-1 relative canvas-container hidden">
                
                <!-- 悬浮工具栏 -->
                <div class="absolute top-4 left-1/2 -translate-x-1/2 flex items-center gap-1 p-1.5 bg-gray-900/90 backdrop-blur-md rounded-xl shadow-2xl border border-gray-700/50 z-20">
                    <button class="tool-btn active-tool p-2 rounded-lg text-white bg-violet-600 shadow-md transition-colors" data-tool="pan" title="拖拽平移"><i class="fa-solid fa-hand"></i></button>
                    <button class="tool-btn p-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-colors" data-tool="pen" title="画笔 (左键)"><i class="fa-solid fa-pen"></i></button>
                    <button class="tool-btn p-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-colors" data-tool="fill" title="油漆桶"><i class="fa-solid fa-fill-drip"></i></button>
                    <button class="tool-btn p-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-colors" data-tool="eraser" title="橡皮擦"><i class="fa-solid fa-eraser"></i></button>
                    
                    <div class="w-px h-6 bg-gray-700 my-auto mx-2"></div>
                    
                    <button id="btn-zoom-in" class="p-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-colors" title="放大"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                    <button id="btn-zoom-out" class="p-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-colors" title="缩小"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                    <button id="btn-fit" class="p-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-colors" title="适应屏幕"><i class="fa-solid fa-expand"></i></button>

                    <div class="w-px h-6 bg-gray-700 my-auto mx-2"></div>
                    <button id="btn-toggle-grid" class="p-2 rounded-lg text-white bg-gray-800 transition-colors" title="切换网格"><i class="fa-solid fa-border-none"></i></button>
                    <button id="btn-toggle-shape" class="p-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition-colors" title="切换形状 (方/圆)"><i class="fa-solid fa-circle"></i></button>
                </div>

                <!-- 渲染主画布 -->
                <canvas id="main-canvas" class="absolute inset-0 z-10 touch-none"></canvas>
            </div>
            
        </main>

        <!-- 右侧工具与材料清单面板 -->
        <aside id="panel-materials" class="w-full md:w-80 shrink-0 border-l border-gray-800 bg-gray-900 flex-col hidden md:flex">
            
            <!-- 选色盘 (移动端和桌面端共用) -->
            <div class="p-4 border-b border-gray-800">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2"><i class="fa-solid fa-eye-dropper"></i> 调色板 (用于画笔)</h2>
                <div id="palette-grid" class="grid grid-cols-6 sm:grid-cols-8 md:grid-cols-6 gap-2 max-h-40 overflow-y-auto pr-2 pb-2">
                    <!-- 色块由 JS 动态生成 -->
                </div>
            </div>

            <!-- 统计清单 -->
            <div class="flex-1 flex flex-col p-4 overflow-hidden bg-gray-900/50">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider flex items-center gap-2"><i class="fa-solid fa-list-check"></i> 所需材料清单</h2>
                    <span id="total-beads-count" class="text-xs font-mono text-gray-400 bg-gray-800 px-2 py-0.5 rounded-full border border-gray-700">0 颗</span>
                </div>
                
                <div id="materials-list" class="flex-1 overflow-y-auto space-y-2 pr-1 pb-16 md:pb-0">
                    <p class="text-sm text-gray-600 text-center mt-10">暂无数据，请先上传图片</p>
                </div>
            </div>
        </aside>

    </div>

    <!-- 移动端底部导航 -->
    <div class="md:hidden h-16 bg-gray-950 border-t border-gray-800 flex items-center justify-around shrink-0 z-30 pb-safe">
        <button class="nav-btn flex flex-col items-center gap-1 p-2 text-violet-400" data-target="panel-settings">
            <i class="fa-solid fa-sliders text-lg"></i>
            <span class="text-[10px] font-medium">设置</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 p-2 text-gray-500" data-target="panel-canvas">
            <i class="fa-solid fa-image text-lg"></i>
            <span class="text-[10px] font-medium">画板</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 p-2 text-gray-500" data-target="panel-materials">
            <i class="fa-solid fa-list text-lg"></i>
            <span class="text-[10px] font-medium">材料</span>
        </button>
    </div>

    <script>
        /**
         * 状态管理
         */
        const AppState = {
            imageObj: null,
            gridData: [], // 存储每一个格子的色号对象或null
            gridW: 0,
            gridH: 0,
            materials: {}, // 色号计数
            
            // 设置项
            settings: {
                width: 50,
                palette: 'standard',
                dither: false,
                ignoreWhite: true,
                brightness: 0,
                contrast: 0,
                showGrid: true,
                shape: 'circle' // circle 或 square
            },
            
            // 画布交互状态
            canvas: {
                scale: 1,
                offsetX: 0,
                offsetY: 0,
                isDragging: false,
                startX: 0,
                startY: 0,
                tool: 'pan', // pan, pen, eraser, fill
                selectedColorId: null,
                beadSize: 20 // 基础绘制大小
            }
        };

        /**
         * 行业标准调色板定义 (包含参考图中的 F11, G4, C8, H2 等)
         */
        const PALETTES = {
            standard: [
                // 参考图核心颜色
                { id: 'F11', name: '深咖啡', hex: '#452A20', textColor: '#FFFFFF' },
                { id: 'G4',  name: '浅肤色', hex: '#F0C8A0', textColor: '#000000' },
                { id: 'C8',  name: '亮蓝色', hex: '#2359A6', textColor: '#FFFFFF' },
                { id: 'H2',  name: '纯白色', hex: '#FFFFFF', textColor: '#000000' },
                // 扩充丰富的色系，确保转换效果好
                { id: 'A1', name: '黑色', hex: '#1C1C1C', textColor: '#FFFFFF' },
                { id: 'A2', name: '深灰', hex: '#595959', textColor: '#FFFFFF' },
                { id: 'A3', name: '浅灰', hex: '#A3A3A3', textColor: '#000000' },
                { id: 'B1', name: '正红', hex: '#D82833', textColor: '#FFFFFF' },
                { id: 'B2', name: '暗红', hex: '#9E1A22', textColor: '#FFFFFF' },
                { id: 'B3', name: '粉红', hex: '#F0A1B2', textColor: '#000000' },
                { id: 'C1', name: '橙色', hex: '#F07D1C', textColor: '#000000' },
                { id: 'C2', name: '浅橙', hex: '#F5B075', textColor: '#000000' },
                { id: 'D1', name: '正黄', hex: '#F6D927', textColor: '#000000' },
                { id: 'D2', name: '浅黄', hex: '#FDF19E', textColor: '#000000' },
                { id: 'E1', name: '深绿', hex: '#26663B', textColor: '#FFFFFF' },
                { id: 'E2', name: '正绿', hex: '#4CA35D', textColor: '#000000' },
                { id: 'E3', name: '浅绿', hex: '#A1D99B', textColor: '#000000' },
                { id: 'F1', name: '天蓝', hex: '#63B3E3', textColor: '#000000' },
                { id: 'F2', name: '深蓝', hex: '#1C315E', textColor: '#FFFFFF' },
                { id: 'G1', name: '紫色', hex: '#79428B', textColor: '#FFFFFF' },
                { id: 'G2', name: '浅紫', hex: '#C298D4', textColor: '#000000' },
                { id: 'H1', name: '土黄', hex: '#CBA052', textColor: '#000000' },
                { id: 'H3', name: '奶油', hex: '#F8E9C9', textColor: '#000000' },
                { id: 'I1', name: '透明', hex: '#E2E8F0', textColor: '#000000' }
            ],
            perler: [
                { id: 'P01', name: 'White', hex: '#FFFFFF', textColor: '#000' },
                { id: 'P02', name: 'Black', hex: '#2B2B2B', textColor: '#FFF' },
                { id: 'P03', name: 'Red', hex: '#C73843', textColor: '#FFF' },
                { id: 'P04', name: 'Orange', hex: '#F37827', textColor: '#000' },
                { id: 'P05', name: 'Yellow', hex: '#F6D835', textColor: '#000' },
                { id: 'P06', name: 'Green', hex: '#3A8B58', textColor: '#FFF' },
                { id: 'P07', name: 'Light Blue', hex: '#5285CD', textColor: '#FFF' },
                { id: 'P08', name: 'Dark Blue', hex: '#2A3660', textColor: '#FFF' },
                { id: 'P09', name: 'Purple', hex: '#633C7B', textColor: '#FFF' },
                { id: 'P10', name: 'Pink', hex: '#F271A6', textColor: '#000' },
                { id: 'P11', name: 'Tan', hex: '#D9A977', textColor: '#000' },
                { id: 'P12', name: 'Brown', hex: '#5C3E26', textColor: '#FFF' },
                { id: 'P13', name: 'Grey', hex: '#8F908A', textColor: '#000' }
            ],
            grayscale: [
                { id: 'G01', name: '纯白', hex: '#FFFFFF', textColor: '#000' },
                { id: 'G02', name: '浅灰', hex: '#D3D3D3', textColor: '#000' },
                { id: 'G03', name: '银灰', hex: '#C0C0C0', textColor: '#000' },
                { id: 'G04', name: '中灰', hex: '#A9A9A9', textColor: '#000' },
                { id: 'G05', name: '深灰', hex: '#696969', textColor: '#FFF' },
                { id: 'G06', name: '纯黑', hex: '#000000', textColor: '#FFF' }
            ]
        };

        // 默认选中第一个颜色
        AppState.canvas.selectedColorId = PALETTES.standard[0].id;

        /**
         * 辅助函数：十六进制转 RGB
         */
        function hexToRgb(hex) {
            let r = 0, g = 0, b = 0;
            if (hex.length === 4) {
                r = parseInt(hex[1] + hex[1], 16);
                g = parseInt(hex[2] + hex[2], 16);
                b = parseInt(hex[3] + hex[3], 16);
            } else if (hex.length === 7) {
                r = parseInt(hex.substring(1, 3), 16);
                g = parseInt(hex.substring(3, 5), 16);
                b = parseInt(hex.substring(5, 7), 16);
            }
            return { r, g, b };
        }

        /**
         * 辅助函数：显示 Toast 提示
         */
        function showToast(message, icon = 'fa-info-circle') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fa-solid ${icon} text-violet-400"></i> <span>${message}</span>`;
            container.appendChild(toast);
            
            // 触发动画
            setTimeout(() => toast.classList.add('show'), 10);
            
            // 自动移除
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        /**
         * 核心处理逻辑：将图片转为拼豆像素阵列
         */
        function processImage() {
            if (!AppState.imageObj) return;

            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');

            const w = AppState.settings.width;
            const aspect = AppState.imageObj.height / AppState.imageObj.width;
            const h = Math.max(1, Math.round(w * aspect));

            AppState.gridW = w;
            AppState.gridH = h;
            tempCanvas.width = w;
            tempCanvas.height = h;

            // 绘制并获取缩小后的像素数据 (自带最邻近插值或双线性平滑)
            ctx.drawImage(AppState.imageObj, 0, 0, w, h);
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;

            // 预先处理颜色与对比度
            const contrast = AppState.settings.contrast;
            const brightness = AppState.settings.brightness;
            const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));

            for (let i = 0; i < data.length; i += 4) {
                data[i] = factor * (data[i] - 128) + 128 + brightness;
                data[i+1] = factor * (data[i+1] - 128) + 128 + brightness;
                data[i+2] = factor * (data[i+2] - 128) + 128 + brightness;
            }

            // 获取调色板并转换为RGB
            const activePalette = PALETTES[AppState.settings.palette];
            const paletteRgb = activePalette.map(p => ({ ...p, ...hexToRgb(p.hex) }));
            const pLen = paletteRgb.length;
            
            const newGrid = new Array(w * h).fill(null);
            AppState.materials = {};

            // 图像量化循环
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = (y * w + x) * 4;
                    const r = data[idx]; const g = data[idx+1]; const b = data[idx+2]; const a = data[idx+3];

                    // 处理透明度
                    if (a < 128) {
                        continue;
                    }
                    
                    // 处理纯白背景 (如果开启了忽略白色)
                    if (AppState.settings.ignoreWhite && r > 245 && g > 245 && b > 245) {
                        continue;
                    }

                    // 寻找最近的颜色 (使用加权欧几里得距离)
                    let minDest = Infinity;
                    let closestColor = paletteRgb[0];

                    for (let j = 0; j < pLen; j++) {
                        const p = paletteRgb[j];
                        const d = 2 * Math.pow(r - p.r, 2) + 4 * Math.pow(g - p.g, 2) + 3 * Math.pow(b - p.b, 2);
                        if (d < minDest) {
                            minDest = d;
                            closestColor = p;
                        }
                    }

                    // 记录色号
                    newGrid[y * w + x] = activePalette.find(c => c.id === closestColor.id);
                    
                    // 统计材料
                    if (!AppState.materials[closestColor.id]) AppState.materials[closestColor.id] = 0;
                    AppState.materials[closestColor.id]++;

                    // 抖动算法 (Floyd-Steinberg)
                    if (AppState.settings.dither) {
                        const errR = r - closestColor.r; 
                        const errG = g - closestColor.g; 
                        const errB = b - closestColor.b;
                        
                        const distribute = (dx, dy, fraction) => {
                            if (x + dx >= 0 && x + dx < w && y + dy >= 0 && y + dy < h) {
                                const targetIdx = ((y + dy) * w + (x + dx)) * 4;
                                if (data[targetIdx+3] >= 128) {
                                    data[targetIdx] = Math.min(255, Math.max(0, data[targetIdx] + errR * fraction));
                                    data[targetIdx+1] = Math.min(255, Math.max(0, data[targetIdx+1] + errG * fraction));
                                    data[targetIdx+2] = Math.min(255, Math.max(0, data[targetIdx+2] + errB * fraction));
                                }
                            }
                        };
                        distribute(1, 0, 7/16); distribute(-1, 1, 3/16); distribute(0, 1, 5/16); distribute(1, 1, 1/16);
                    }
                }
            }

            AppState.gridData = newGrid;
            
            updateMaterialsUI();
            fitCanvasToScreen();
            renderCanvas();
        }

        /**
         * 渲染主工作区画布
         */
        function renderCanvas() {
            const canvas = document.getElementById('main-canvas');
            const container = document.getElementById('workspace');
            
            // 确保画布尺寸和容器一致 (解决高分屏模糊可乘以 devicePixelRatio，这里为简化保持1:1)
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const gridW = AppState.gridW;
            const gridH = AppState.gridH;
            const bs = AppState.canvas.beadSize;
            
            // 清除背景
            ctx.clearRect(0, 0, w, h);

            if (gridW === 0) return;

            ctx.save();
            // 应用平移和缩放
            ctx.translate(AppState.canvas.offsetX, AppState.canvas.offsetY);
            ctx.scale(AppState.canvas.scale, AppState.canvas.scale);

            // 画布背板 (白色底板，带阴影)
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 10;
            ctx.fillRect(0, 0, gridW * bs, gridH * bs);
            ctx.shadowColor = 'transparent';

            // 绘制网格线和拼豆
            for (let y = 0; y < gridH; y++) {
                for (let x = 0; x < gridW; x++) {
                    const colorObj = AppState.gridData[y * gridW + x];
                    const px = x * bs;
                    const py = y * bs;

                    if (colorObj) {
                        ctx.fillStyle = colorObj.hex;
                        if (AppState.settings.shape === 'circle') {
                            // 绘制圆形拼豆带反光立体感
                            ctx.beginPath();
                            ctx.arc(px + bs/2, py + bs/2, bs/2 - 1, 0, Math.PI * 2);
                            ctx.fill();
                            
                            // 拼豆中心孔洞
                            ctx.fillStyle = 'rgba(0,0,0,0.2)';
                            ctx.beginPath();
                            ctx.arc(px + bs/2, py + bs/2, bs/4, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.fillStyle = '#ffffff';
                            ctx.beginPath();
                            ctx.arc(px + bs/2, py + bs/2, bs/4 - 1, 0, Math.PI * 2);
                            ctx.fill();
                        } else {
                            // 绘制方形拼豆
                            ctx.fillRect(px, py, bs, bs);
                        }
                    }

                    // 绘制网格线
                    if (AppState.settings.showGrid) {
                        // 每 5 格画红线(模拟图纸风格)，其余画灰线
                        if (x % 5 === 0 || y % 5 === 0) {
                            ctx.strokeStyle = (x % 5 === 0 && y % 5 === 0) ? '#e74c3c' : '#bdc3c7';
                            ctx.lineWidth = (x % 5 === 0 || y % 5 === 0) ? 1.5 / AppState.canvas.scale : 0.5 / AppState.canvas.scale;
                        } else {
                            ctx.strokeStyle = '#e5e7eb';
                            ctx.lineWidth = 0.5 / AppState.canvas.scale;
                        }
                        ctx.strokeRect(px, py, bs, bs);
                    }
                }
            }
            
            // 绘制边缘加粗红色边框 (5x5 模块的边界)
            if (AppState.settings.showGrid) {
                ctx.strokeStyle = '#e74c3c';
                ctx.lineWidth = 2 / AppState.canvas.scale;
                ctx.strokeRect(0, 0, gridW * bs, gridH * bs);
            }

            ctx.restore();
        }

        /**
         * 自动适应屏幕居中
         */
        function fitCanvasToScreen() {
            const container = document.getElementById('workspace');
            if (!container || AppState.gridW === 0) return;
            
            const cw = container.clientWidth;
            const ch = container.clientHeight;
            const gridPixelW = AppState.gridW * AppState.canvas.beadSize;
            const gridPixelH = AppState.gridH * AppState.canvas.beadSize;
            
            const scaleX = (cw * 0.8) / gridPixelW;
            const scaleY = (ch * 0.8) / gridPixelH;
            
            AppState.canvas.scale = Math.min(scaleX, scaleY, 3);
            AppState.canvas.offsetX = (cw - gridPixelW * AppState.canvas.scale) / 2;
            AppState.canvas.offsetY = (ch - gridPixelH * AppState.canvas.scale) / 2;
        }

        /**
         * 油漆桶填充算法 (Flood Fill)
         */
        function floodFill(startX, startY, targetColorObj, startColorObj) {
            const startId = startColorObj ? startColorObj.id : null;
            const targetId = targetColorObj ? targetColorObj.id : null;
            if (startId === targetId) return;

            const w = AppState.gridW;
            const h = AppState.gridH;
            const stack = [[startX, startY]];
            const data = AppState.gridData;

            while (stack.length > 0) {
                const [x, y] = stack.pop();
                const idx = y * w + x;
                const currentId = data[idx] ? data[idx].id : null;

                if (currentId === startId) {
                    data[idx] = targetColorObj;
                    if (x > 0) stack.push([x - 1, y]);
                    if (x < w - 1) stack.push([x + 1, y]);
                    if (y > 0) stack.push([x, y - 1]);
                    if (y < h - 1) stack.push([x, y + 1]);
                }
            }
        }

        /**
         * 工具应用逻辑 (画笔、橡皮、油漆桶)
         */
        function applyTool(clientX, clientY) {
            const canvas = document.getElementById('main-canvas');
            const rect = canvas.getBoundingClientRect();
            
            // 计算在虚拟网格中的坐标
            const virtualX = (clientX - rect.left - AppState.canvas.offsetX) / AppState.canvas.scale;
            const virtualY = (clientY - rect.top - AppState.canvas.offsetY) / AppState.canvas.scale;

            const gridX = Math.floor(virtualX / AppState.canvas.beadSize);
            const gridY = Math.floor(virtualY / AppState.canvas.beadSize);
            
            const w = AppState.gridW;
            const h = AppState.gridH;

            if (gridX >= 0 && gridX < w && gridY >= 0 && gridY < h) {
                const idx = gridY * w + gridX;
                const currentObj = AppState.gridData[idx];
                const tool = AppState.canvas.tool;
                
                // 获取当前选中的颜色对象
                const activePalette = PALETTES[AppState.settings.palette];
                const colorObj = activePalette.find(c => c.id === AppState.canvas.selectedColorId) || activePalette[0];
                
                let changed = false;

                if (tool === 'pen') {
                    if (!currentObj || currentObj.id !== colorObj.id) {
                        AppState.gridData[idx] = colorObj;
                        changed = true;
                    }
                } else if (tool === 'eraser') {
                    if (currentObj !== null) {
                        AppState.gridData[idx] = null;
                        changed = true;
                    }
                } else if (tool === 'fill') {
                    floodFill(gridX, gridY, colorObj, currentObj);
                    changed = true;
                }

                if (changed) {
                    recalculateMaterials();
                    renderCanvas();
                }
            }
        }

        /**
         * 重新计算使用的材料清单
         */
        function recalculateMaterials() {
            AppState.materials = {};
            for (const colorObj of AppState.gridData) {
                if (colorObj) {
                    if (!AppState.materials[colorObj.id]) AppState.materials[colorObj.id] = 0;
                    AppState.materials[colorObj.id]++;
                }
            }
            updateMaterialsUI();
        }

        /**
         * 核心功能：生成并导出符合行业标准的拼豆图纸 (参考图片风格)
         */
        function exportProfessionalBlueprint() {
            if (AppState.gridW === 0) {
                showToast('请先上传图片生成图纸', 'fa-triangle-exclamation');
                return;
            }

            showToast('正在生成高清图纸，请稍候...', 'fa-spinner fa-spin');

            setTimeout(() => {
                const w = AppState.gridW;
                const h = AppState.gridH;
                
                // 导出图纸的具体参数
                const CELL_SIZE = 40;     // 格子像素大小
                const COORD_SIZE = 30;    // 坐标轴宽度/高度
                const LINE_THIN = 1;      // 细网格线宽度
                const LINE_THICK = 3;     // 粗网格线(红线)宽度
                const COLOR_RED = '#e74c3c'; // 参考图中的红线颜色
                const COLOR_GREY = '#dddddd';// 坐标底色/细线颜色
                
                // 计算底部图例需要的高度
                const usedColors = Object.entries(AppState.materials).sort((a,b) => b[1]-a[1]);
                const colsPerLegendRow = 8;
                const legendRows = Math.ceil(usedColors.length / colsPerLegendRow);
                const LEGEND_HEIGHT = legendRows * 60 + 40; // 包含 padding

                // 创建离屏高清画布
                const canvas = document.createElement('canvas');
                canvas.width = COORD_SIZE * 2 + w * CELL_SIZE; // 左右都有坐标
                canvas.height = COORD_SIZE * 2 + h * CELL_SIZE + LEGEND_HEIGHT; // 上下都有坐标 + 底部图例
                const ctx = canvas.getContext('2d');

                // 填充全白底色
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // --- 1. 绘制网格内容与文字 ---
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const gridStartX = COORD_SIZE;
                const gridStartY = COORD_SIZE;

                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const colorObj = AppState.gridData[y * w + x];
                        const px = gridStartX + x * CELL_SIZE;
                        const py = gridStartY + y * CELL_SIZE;

                        if (colorObj) {
                            // 填充背景色
                            ctx.fillStyle = colorObj.hex;
                            ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
                            // 绘制色号文本 (自动对比色)
                            ctx.fillStyle = colorObj.textColor;
                            ctx.fillText(colorObj.id, px + CELL_SIZE/2, py + CELL_SIZE/2);
                        }
                    }
                }

                // --- 2. 绘制坐标轴底色 ---
                ctx.fillStyle = '#eeeeee';
                // 上下坐标条
                ctx.fillRect(gridStartX, 0, w * CELL_SIZE, COORD_SIZE);
                ctx.fillRect(gridStartX, gridStartY + h * CELL_SIZE, w * CELL_SIZE, COORD_SIZE);
                // 左右坐标条
                ctx.fillRect(0, gridStartY, COORD_SIZE, h * CELL_SIZE);
                ctx.fillRect(gridStartX + w * CELL_SIZE, gridStartY, COORD_SIZE, h * CELL_SIZE);

                // --- 3. 绘制坐标轴数字 ---
                ctx.fillStyle = '#333333';
                ctx.font = '14px Arial';
                // 列坐标 (上 & 下)
                for (let x = 0; x < w; x++) {
                    const cx = gridStartX + x * CELL_SIZE + CELL_SIZE/2;
                    ctx.fillText(x + 1, cx, COORD_SIZE / 2);
                    ctx.fillText(x + 1, cx, gridStartY + h * CELL_SIZE + COORD_SIZE / 2);
                }
                // 行坐标 (左 & 右)
                for (let y = 0; y < h; y++) {
                    const cy = gridStartY + y * CELL_SIZE + CELL_SIZE/2;
                    ctx.fillText(y + 1, COORD_SIZE / 2, cy);
                    ctx.fillText(y + 1, gridStartX + w * CELL_SIZE + COORD_SIZE / 2, cy);
                }

                // --- 4. 绘制网格线 (精准还原) ---
                // 先画所有细的灰线
                ctx.strokeStyle = COLOR_GREY;
                ctx.lineWidth = LINE_THIN;
                ctx.beginPath();
                for(let x=1; x<w; x++) {
                    if (x%5 !== 0) { ctx.moveTo(gridStartX + x*CELL_SIZE, 0); ctx.lineTo(gridStartX + x*CELL_SIZE, gridStartY + h*CELL_SIZE + COORD_SIZE); }
                }
                for(let y=1; y<h; y++) {
                    if (y%5 !== 0) { ctx.moveTo(0, gridStartY + y*CELL_SIZE); ctx.lineTo(gridStartX + w*CELL_SIZE + COORD_SIZE, gridStartY + y*CELL_SIZE); }
                }
                ctx.stroke();

                // 后画每 5 格的红色粗线及外边框
                ctx.strokeStyle = COLOR_RED;
                ctx.lineWidth = LINE_THICK;
                ctx.beginPath();
                // 垂直红线 (包含最左最右)
                for(let x=0; x<=w; x+=5) {
                    ctx.moveTo(gridStartX + x*CELL_SIZE, 0); ctx.lineTo(gridStartX + x*CELL_SIZE, gridStartY + h*CELL_SIZE + COORD_SIZE);
                }
                // 水平红线 (包含最上最下)
                for(let y=0; y<=h; y+=5) {
                    ctx.moveTo(0, gridStartY + y*CELL_SIZE); ctx.lineTo(gridStartX + w*CELL_SIZE + COORD_SIZE, gridStartY + y*CELL_SIZE);
                }
                // 补全最右最下如果不能被5整除的外边框
                if(w%5 !== 0) { ctx.moveTo(gridStartX + w*CELL_SIZE, 0); ctx.lineTo(gridStartX + w*CELL_SIZE, gridStartY + h*CELL_SIZE + COORD_SIZE); }
                if(h%5 !== 0) { ctx.moveTo(0, gridStartY + h*CELL_SIZE); ctx.lineTo(gridStartX + w*CELL_SIZE + COORD_SIZE, gridStartY + h*CELL_SIZE); }
                ctx.stroke();

                // --- 5. 绘制底部材料图例 (Legend) ---
                const legendStartY = gridStartY + h * CELL_SIZE + COORD_SIZE + 20;
                let lx = 20;
                let ly = legendStartY;
                const activePalette = PALETTES[AppState.settings.palette];
                
                // 绘制一个标题
                ctx.fillStyle = '#000000';
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('所需材料汇总:', lx, ly);
                ly += 30;

                ctx.font = 'bold 16px Arial';
                usedColors.forEach((entry, index) => {
                    const id = entry[0];
                    const count = entry[1];
                    const colorObj = activePalette.find(c => c.id === id);
                    
                    if(index > 0 && index % colsPerLegendRow === 0) {
                        lx = 20;
                        ly += 45;
                    }

                    // 画色块
                    ctx.fillStyle = colorObj.hex;
                    ctx.fillRect(lx, ly, 45, 30);
                    // 画边框
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(lx, ly, 45, 30);
                    
                    // 色块内文字 (ID)
                    ctx.fillStyle = colorObj.textColor;
                    ctx.textAlign = 'center';
                    ctx.fillText(id, lx + 22.5, ly + 15);
                    
                    // 旁边数量
                    ctx.fillStyle = '#333333';
                    ctx.textAlign = 'left';
                    ctx.fillText(count.toString(), lx + 52, ly + 15);

                    lx += 120; // 每个 Legend 占据的宽度
                });

                // 下载图片
                const a = document.createElement('a');
                a.href = canvas.toDataURL('image/png');
                a.download = `标准拼豆图纸_${w}x${h}.png`;
                a.click();
                
                showToast('图纸导出成功！', 'fa-check');
            }, 100); // 稍微延迟以显示 Toast 动画
        }

        /**
         * 导出 CSV 清单
         */
        function exportCSV() {
            if (Object.keys(AppState.materials).length === 0) return;
            const activePalette = PALETTES[AppState.settings.palette];
            let csv = '\uFEFF色号,颜色名称,十六进制,需要数量\n'; // UTF-8 BOM
            
            Object.entries(AppState.materials)
                .sort((a,b) => b[1]-a[1])
                .forEach(([id, count]) => {
                    const colorObj = activePalette.find(c => c.id === id);
                    csv += `"${id}","${colorObj.name}",${colorObj.hex},${count}\n`;
                });
                
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `材料清单.csv`;
            a.click();
        }

        /**
         * 更新右侧材料面板 UI
         */
        function updateMaterialsUI() {
            const listEl = document.getElementById('materials-list');
            const activePalette = PALETTES[AppState.settings.palette];
            let total = 0;
            
            listEl.innerHTML = '';
            
            const sorted = Object.entries(AppState.materials).sort((a,b) => b[1]-a[1]);

        /**
         * 渲染选色盘
         */
        function renderPaletteUI() {
            const grid = document.getElementById('palette-grid');
            grid.innerHTML = '';
            const activePalette = PALETTES[AppState.settings.palette];
            
            // 确保当前选中的颜色有效
            if (!activePalette.find(c => c.id === AppState.canvas.selectedColorId)) {
                AppState.canvas.selectedColorId = activePalette[0].id;
            }

            activePalette.forEach(c => {
                const btn = document.createElement('button');
                btn.title = `${c.name} (${c.id})`;
                const isSelected = AppState.canvas.selectedColorId === c.id;
                
                btn.className = `w-full aspect-square rounded-full border-2 shadow-sm transition-transform flex items-center justify-center text-[8px] font-bold ${isSelected ? 'border-violet-500 scale-125 z-10' : 'border-gray-700 hover:scale-110'}`;
                btn.style.backgroundColor = c.hex;
                btn.style.color = c.textColor;
                btn.innerText = c.id; // 在色块上显示简写
                
                btn.onclick = () => {
                    AppState.canvas.selectedColorId = c.id;
                    // 如果当前是平移模式，点击色块自动切换为画笔
                    if(AppState.canvas.tool === 'pan') setTool('pen');
                    renderPaletteUI();
                };
                grid.appendChild(btn);
            });
        }

        /**
         * 切换工具
         */
        function setTool(toolName) {
            AppState.canvas.tool = toolName;
            document.querySelectorAll('.tool-btn').forEach(btn => {
                if (btn.dataset.tool === toolName) {
                    btn.classList.add('bg-violet-600', 'text-white', 'shadow-md');
                    btn.classList.remove('text-gray-400', 'hover:bg-gray-800');
                } else {
                    btn.classList.remove('bg-violet-600', 'text-white', 'shadow-md');
                    btn.classList.add('text-gray-400', 'hover:bg-gray-800');
                }
            });
            
            const canvasContainer = document.getElementById('workspace');
            if (toolName === 'pan') canvasContainer.style.cursor = 'grab';
            else if (toolName === 'pen') canvasContainer.style.cursor = 'crosshair';
            else if (toolName === 'eraser') canvasContainer.style.cursor = 'cell';
            else if (toolName === 'fill') canvasContainer.style.cursor = 'crosshair';
        }

                        // 缩略图更新
                        const preview = document.getElementById('source-image-preview');
                        preview.src = url;
                        preview.classList.remove('hidden');
                        document.getElementById('upload-icon').classList.add('hidden');
                        document.getElementById('upload-text').classList.add('hidden');
                        
                        // 移动端自动切回画板
                        if (window.innerWidth < 768) {
                            document.querySelector('[data-target="panel-canvas"]').click();
                        }

                        processImage();
                    };
                    img.src = url;
                }
            });

            // --- 设置项绑定 ---
            document.getElementById('setting-width').addEventListener('input', (e) => {
                AppState.settings.width = parseInt(e.target.value);
                document.getElementById('val-width').textContent = AppState.settings.width;
                processImage();
            });
            document.getElementById('setting-brightness').addEventListener('input', (e) => {
                AppState.settings.brightness = parseInt(e.target.value);
                document.getElementById('val-brightness').textContent = AppState.settings.brightness > 0 ? '+'+AppState.settings.brightness : AppState.settings.brightness;
                processImage();
            });
            document.getElementById('setting-contrast').addEventListener('input', (e) => {
                AppState.settings.contrast = parseInt(e.target.value);
                document.getElementById('val-contrast').textContent = AppState.settings.contrast > 0 ? '+'+AppState.settings.contrast : AppState.settings.contrast;
                processImage();
            });
            document.getElementById('setting-palette').addEventListener('change', (e) => {
                AppState.settings.palette = e.target.value;
                renderPaletteUI();
                processImage();
            });
            
            // 开关按钮
            document.getElementById('setting-dither').addEventListener('click', () => {
                AppState.settings.dither = !AppState.settings.dither;
                const knob = document.getElementById('dither-knob');
                const bg = document.getElementById('setting-dither');
                if(AppState.settings.dither) {
                    knob.classList.add('translate-x-5');
                    bg.classList.replace('bg-gray-700', 'bg-violet-600');
                } else {
                    knob.classList.remove('translate-x-5');
                    bg.classList.replace('bg-violet-600', 'bg-gray-700');
                }
                processImage();
            });
            document.getElementById('setting-ignore-white').addEventListener('click', () => {
                AppState.settings.ignoreWhite = !AppState.settings.ignoreWhite;
                const knob = document.getElementById('ignore-white-knob');
                const bg = document.getElementById('setting-ignore-white');
                if(AppState.settings.ignoreWhite) {
                    knob.classList.add('translate-x-5');
                    bg.classList.replace('bg-gray-700', 'bg-violet-600');
                } else {
                    knob.classList.remove('translate-x-5');
                    bg.classList.replace('bg-violet-600', 'bg-gray-700');
                }
                processImage();
            });

            // --- 工具栏绑定 ---
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.addEventListener('click', (e) => setTool(e.currentTarget.dataset.tool));
            });
            
            document.getElementById('btn-zoom-in').onclick = () => { AppState.canvas.scale = Math.min(10, AppState.canvas.scale * 1.2); renderCanvas(); };
            document.getElementById('btn-zoom-out').onclick = () => { AppState.canvas.scale = Math.max(0.1, AppState.canvas.scale / 1.2); renderCanvas(); };
            document.getElementById('btn-fit').onclick = () => { fitCanvasToScreen(); renderCanvas(); };
            
            document.getElementById('btn-toggle-grid').onclick = (e) => {
                AppState.settings.showGrid = !AppState.settings.showGrid;
                e.currentTarget.classList.toggle('bg-gray-800');
                e.currentTarget.classList.toggle('bg-violet-600');
                renderCanvas();
            };
            document.getElementById('btn-toggle-shape').onclick = (e) => {
                AppState.settings.shape = AppState.settings.shape === 'circle' ? 'square' : 'circle';
                e.currentTarget.innerHTML = AppState.settings.shape === 'circle' ? '<i class="fa-solid fa-circle"></i>' : '<i class="fa-solid fa-square"></i>';
                renderCanvas();
            };

            // --- 画布交互事件 (鼠标/触摸) ---
            const canvasContainer = document.getElementById('workspace');
            
            const pointerDownHandler = (e) => {
                if (AppState.gridW === 0) return;
                
                // 处理中键拖拽平移或当前为平移工具
                if (e.button === 1 || AppState.canvas.tool === 'pan' || (e.touches && e.touches.length >= 2)) {
                    AppState.canvas.isDragging = true;
                    if(AppState.canvas.tool === 'pan') canvasContainer.style.cursor = 'grabbing';
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    AppState.canvas.startX = clientX - AppState.canvas.offsetX;
                    AppState.canvas.startY = clientY - AppState.canvas.offsetY;
                } else if (e.button === 0 || (e.touches && e.touches.length === 1)) {
                    // 画笔/橡皮擦等
                    AppState.canvas.isDragging = true; // 复用变量表示正在绘画
                    const clientX = e.clientX || e.touches[0].clientX;
                    const clientY = e.clientY || e.touches[0].clientY;
                    applyTool(clientX, clientY);
                }
            };

            const pointerMoveHandler = (e) => {
                if (!AppState.canvas.isDragging) return;
                e.preventDefault(); // 阻止移动端下拉刷新等

                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);

                if (AppState.canvas.tool === 'pan' || (e.touches && e.touches.length >= 2) || e.buttons === 4) {
                    // 平移
                    AppState.canvas.offsetX = clientX - AppState.canvas.startX;
                    AppState.canvas.offsetY = clientY - AppState.canvas.startY;
                    renderCanvas();
                } else if (AppState.canvas.tool !== 'pan') {
                    // 绘画
                    applyTool(clientX, clientY);
                }
            };

            const pointerUpHandler = () => {
                AppState.canvas.isDragging = false;
                if(AppState.canvas.tool === 'pan') canvasContainer.style.cursor = 'grab';
            };

            canvasContainer.addEventListener('mousedown', pointerDownHandler);
            canvasContainer.addEventListener('mousemove', pointerMoveHandler);
            window.addEventListener('mouseup', pointerUpHandler);
            
            canvasContainer.addEventListener('touchstart', pointerDownHandler, {passive: false});
            canvasContainer.addEventListener('touchmove', pointerMoveHandler, {passive: false});
            window.addEventListener('touchend', pointerUpHandler);

            // 滚轮缩放
            canvasContainer.addEventListener('wheel', (e) => {
                e.preventDefault();
                const rect = canvasContainer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
                const newScale = Math.max(0.1, Math.min(AppState.canvas.scale * zoomFactor, 15));

                // 保持鼠标位置对应的图纸位置不变
                AppState.canvas.offsetX = mouseX - (mouseX - AppState.canvas.offsetX) * (newScale / AppState.canvas.scale);
                AppState.canvas.offsetY = mouseY - (mouseY - AppState.canvas.offsetY) * (newScale / AppState.canvas.scale);
                AppState.canvas.scale = newScale;
                
                renderCanvas();
            }, { passive: false });

            // 窗口调整
            window.addEventListener('resize', () => {
                if(AppState.gridW > 0) renderCanvas();
            });

            // --- 移动端底部 Tab 切换 ---
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetId = e.currentTarget.dataset.target;
                    
                    // 重置按钮颜色
                    document.querySelectorAll('.nav-btn').forEach(b => {
                        b.classList.remove('text-violet-400');
                        b.classList.add('text-gray-500');
                    });
                    e.currentTarget.classList.add('text-violet-400');
                    e.currentTarget.classList.remove('text-gray-500');

                    // 切换面板类名 (对于移动端显示/隐藏)
                    ['panel-settings', 'panel-canvas', 'panel-materials'].forEach(id => {
                        const el = document.getElementById(id);
                        if (id === targetId) {
                            el.classList.add('mobile-active');
                            el.classList.remove('mobile-hidden');
                        } else {
                            el.classList.remove('mobile-active');
                            el.classList.add('mobile-hidden');
                        }
                    });

                    // 切换回画板时，需要重新触发画布resize渲染
                    if(targetId === 'panel-canvas' && AppState.gridW > 0) {
                        setTimeout(renderCanvas, 50);
                    }
                });
            });
            
            // 初始时默认高亮并激活中间画板 (移动端逻辑)
            if (window.innerWidth < 768) {
                document.querySelector('[data-target="panel-canvas"]').click();
            }
        };
    </script>
</body>
</html>
